---
- name: Deploy FastAPI application
  hosts: all
  become: true
  vars:
    app_dir: /opt/app
    venv_dir: /opt/app/.venv
    app_user: appuser
    app_group: appuser
    gunicorn_workers: 4
    app_port: 8000

  tasks:
    #  System dependencies 

    - name: Update system packages
      dnf:
        name: "*"
        state: latest
        update_only: true
      tags: packages

    - name: Install required system packages
      dnf:
        name:
          - python3.11
          - python3.11-pip
          - python3.11-devel
          - nginx
          - git
          - gcc
          - make
        state: present
      tags: packages

    #  App user 

    - name: Create app group
      group:
        name: "{{ app_group }}"
        state: present

    - name: Create app user
      user:
        name: "{{ app_user }}"
        group: "{{ app_group }}"
        home: "{{ app_dir }}"
        create_home: true
        shell: /bin/bash
        system: true

    #  App directory and code 

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0755"

    - name: Copy application files to server
      synchronize:
        src: "{{ playbook_dir }}/../"
        dest: "{{ app_dir }}/"
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=.github"
          - "--exclude=terraform"
          - "--exclude=ansible"
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--exclude=.venv"
          - "--exclude=venv"
          - "--exclude=*.egg-info"
        delete: true
      tags: code

    - name: Set ownership on app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        recurse: true
        owner: "{{ app_user }}"
        group: "{{ app_group }}"

    #  Python virtualenv 

    - name: Create Python 3.11 virtualenv
      command: python3.11 -m venv {{ venv_dir }}
      args:
        creates: "{{ venv_dir }}/bin/python"
      become_user: "{{ app_user }}"

    - name: Upgrade pip in virtualenv
      command: "{{ venv_dir }}/bin/pip install --upgrade pip"
      become_user: "{{ app_user }}"

    - name: Install Python dependencies
      shell: |
        if [ -f {{ app_dir }}/requirements.txt ]; then
          {{ venv_dir }}/bin/pip install -r {{ app_dir }}/requirements.txt
        else
          {{ venv_dir }}/bin/pip install \
            fastapi \
            uvicorn[standard] \
            gunicorn \
            python-multipart \
            aiofiles
        fi
      become_user: "{{ app_user }}"
      tags: install

    - name: Ensure gunicorn is installed in virtualenv
      command: "{{ venv_dir }}/bin/pip install gunicorn uvicorn[standard]"
      become_user: "{{ app_user }}"

    #  Environment file 

    - name: Write app environment file
      shell: |
        cat > {{ app_dir }}/.env << 'ENVEOF'
        APP_ENV=production
        PORT=8000
        HOST=0.0.0.0
        ENVEOF
        chown {{ app_user }}:{{ app_group }} {{ app_dir }}/.env
        chmod 640 {{ app_dir }}/.env

    #  Systemd service 

    - name: Create systemd service file
      copy:
        dest: /etc/systemd/system/fastapi-app.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=FastAPI application (gunicorn + uvicorn)
          After=network.target
          Wants=network-online.target

          [Service]
          Type=notify
          User={{ app_user }}
          Group={{ app_group }}
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ venv_dir }}/bin/gunicorn app.main:app \
              -k uvicorn.workers.UvicornWorker \
              -w {{ gunicorn_workers }} \
              -b 0.0.0.0:{{ app_port }} \
              --timeout 120 \
              --access-logfile - \
              --error-logfile -
          ExecReload=/bin/kill -s HUP $MAINPID
          KillMode=mixed
          TimeoutStopSec=5
          PrivateTmp=true
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      systemd:
        daemon_reload: true

    - name: Enable and start FastAPI service
      systemd:
        name: fastapi-app
        enabled: true
        state: restarted

    #  Nginx configuration 

    - name: Write nginx site configuration
      copy:
        dest: /etc/nginx/conf.d/fastapi-app.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name _;

              access_log /var/log/nginx/fastapi-app-access.log;
              error_log  /var/log/nginx/fastapi-app-error.log;

              location / {
                  proxy_pass         http://127.0.0.1:8000;
                  proxy_http_version 1.1;
                  proxy_set_header   Upgrade $http_upgrade;
                  proxy_set_header   Connection "upgrade";
                  proxy_set_header   Host $host;
                  proxy_set_header   X-Real-IP $remote_addr;
                  proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_read_timeout 300s;
                  proxy_connect_timeout 75s;
              }
          }

    - name: Remove default nginx configuration
      file:
        path: /etc/nginx/conf.d/default.conf
        state: absent
      ignore_errors: true

    - name: Test nginx configuration
      command: nginx -t
      changed_when: false

    - name: Enable and start nginx
      systemd:
        name: nginx
        enabled: true
        state: restarted

    #  Health check on the host 

    - name: Wait for application to be healthy
      uri:
        url: "http://localhost:8000/health"
        method: GET
        status_code: 200
        timeout: 10
      register: health_result
      retries: 12
      delay: 10
      until: health_result.status == 200
      become: false
